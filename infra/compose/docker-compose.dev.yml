# Development environment — no Caddy, open ports for local dev
services:
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    image: storyshelf-frontend:local
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://django:8000
    restart: unless-stopped
    depends_on:
      django:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  django:
    build: ../backend-django
    container_name: storyshelf-django
    environment:
      DJANGO_ENV: dev
      DJANGO_SECRET_KEY: dev-secret-key
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-booksdb}
      CELERY_BROKER_URL: amqp://rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      NLP_SERVICE_URL: http://nlp-service:8000
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ../backend-django:/app
    command: python manage.py runserver 0.0.0.0:8000

  celery-worker:
    build: ../backend-django
    container_name: storyshelf-celery-worker
    environment:
      DJANGO_ENV: dev
      DJANGO_SECRET_KEY: dev-secret-key
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-booksdb}
      CELERY_BROKER_URL: amqp://rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      NLP_SERVICE_URL: http://nlp-service:8000
    depends_on:
      - django
      - rabbitmq
    command: celery -A config worker -l info -c 4

  nlp-service:
    build:
      context: ../../nlp-service
      dockerfile: Dockerfile
    pull_policy: build
    image: storyshelf-nlp:local
    container_name: storyweave-api
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
      CALLBACK_BASE_URL: http://django:8000
    volumes:
      - hf-cache:/cache/huggingface
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: storyshelf-rabbitmq
    ports:
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    container_name: books-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booksdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret-key}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-booksdb}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: storyweave-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
  hf-cache:
