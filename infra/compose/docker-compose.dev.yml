# Development environment — no Caddy, open ports for local dev
services:
  django:
    build: ../../backend-django
    container_name: storyshelf-django
    ports:
      - "8000:8000"
    volumes:
      - ../../backend-django:/app
      - /app/.venv
      - media:/app/media
    environment:
      DJANGO_ENV: dev
      DJANGO_SECRET_KEY: dev-secret-key
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secret-key}@db:5432/${POSTGRES_DB:-booksdb}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000

  svelte:
    build:
      context: ../../svelte-frontend
      dockerfile: Dockerfile.dev
    image: storyshelf-svelte:local
    container_name: svelte
    ports:
      - "5174:5174"
    environment:
      PUBLIC_API_URL: http://localhost:8000/api
      INTERNAL_API_URL: http://django:8000/api
    volumes:
      - ../../svelte-frontend:/app
      - /app/node_modules
      - /app/.svelte-kit
    restart: unless-stopped
    depends_on:
      django:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5174/"]
      interval: 10s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16
    container_name: books-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booksdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret-key}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-booksdb}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

volumes:
  db-data:
  media:
