services:
  frontend:
    image: ghcr.io/stokuj/storyshelf-frontend:main
    container_name: frontend
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      - django
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  django:
    image: ghcr.io/stokuj/storyshelf-django:main
    container_name: storyshelf-django
    expose:
      - "8000"
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-booksdb}
      CELERY_BROKER_URL: amqp://rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: gunicorn config.wsgi -b 0.0.0.0:8000 -w 4

  celery-ner:
    image: ghcr.io/stokuj/storyshelf-django:main
    container_name: storyshelf-celery-ner
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-booksdb}
      CELERY_BROKER_URL: amqp://rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - django
      - rabbitmq
    command: celery -A config worker -Q ner -l info -c 2 --pool prefork

  celery-llm:
    image: ghcr.io/stokuj/storyshelf-django:main
    container_name: storyshelf-celery-llm
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-booksdb}
      CELERY_BROKER_URL: amqp://rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - django
      - rabbitmq
    command: celery -A config worker -Q llm -l info -c 10 --pool gevent

  flower:
    image: mher/flower:2.0
    container_name: storyshelf-flower
    restart: unless-stopped
    expose:
      - "5555"
    environment:
      CELERY_BROKER_URL: amqp://rabbitmq:5672//
    depends_on:
      - rabbitmq
    command: celery -A config flower --port=5555 --broker=amqp://rabbitmq:5672//

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: storyshelf-rabbitmq
    restart: unless-stopped
    volumes:
      - ../rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: storyshelf-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    depends_on:
      - frontend
      - django

  db:
    image: postgres:16
    container_name: books-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booksdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret-key}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-booksdb}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: storyweave-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
  caddy-data:
  caddy-config:
