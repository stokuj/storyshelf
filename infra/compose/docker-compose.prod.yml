services:
  frontend:
    image: ghcr.io/stokuj/storyshelf-frontend:main
    container_name: frontend
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      - django
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  django:
    image: ghcr.io/stokuj/storyshelf-django:main
    container_name: storyshelf-django
    expose:
      - "8000"
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-booksdb}
      CELERY_BROKER_URL: amqp://rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      NLP_SERVICE_URL: http://nlp-service:8000
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: gunicorn config.wsgi -b 0.0.0.0:8000 -w 4

  celery-worker:
    image: ghcr.io/stokuj/storyshelf-django:main
    container_name: storyshelf-celery-worker
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-booksdb}
      CELERY_BROKER_URL: amqp://rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      NLP_SERVICE_URL: http://nlp-service:8000
    depends_on:
      - django
      - rabbitmq
    command: celery -A config worker -l info -c 4

  nlp-service:
    image: ghcr.io/stokuj/storyshelf-nlp:main
    container_name: nlp-service
    expose:
      - "8000"
    env_file:
      - ../../.env
    environment:
      APP_ENV: production
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
      CALLBACK_BASE_URL: http://django:8000
    volumes:
      - hf-cache:/cache/huggingface
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: storyshelf-rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: storyshelf-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    depends_on:
      - frontend
      - django
      - nlp-service

  db:
    image: postgres:16
    container_name: books-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booksdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret-key}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-booksdb}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: storyweave-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
  hf-cache:
  caddy-data:
  caddy-config:
