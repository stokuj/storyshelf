<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<title>StoryShelf — Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&family=Kalam:wght@300;400;700&family=Architects+Daughter&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #f6f1e7;
    --paper-2: #efe8d8;
    --ink: #1a1814;
    --ink-2: #3d362a;
    --muted: #8a8275;
    --rule: #2a2620;
    --accent: #d94f1e;
    --accent-2: #2a6fdb;
    --grid: rgba(26, 24, 20, 0.06);
  }
  html, body {
    margin: 0; padding: 0;
    background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 24px 24px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 24px 24px,
      var(--paper);
    color: var(--ink);
    font-family: 'Patrick Hand', 'Kalam', cursive;
    font-size: 17px;
    line-height: 1.35;
  }
  * { box-sizing: border-box; }
  .app { padding: 28px 36px 80px; max-width: 1480px; margin: 0 auto; }
  .topbar {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 24px; margin-bottom: 18px;
  }
  .brand {
    font-family: 'Caveat', cursive; font-weight: 700;
    font-size: 44px; line-height: 1; letter-spacing: -0.5px;
  }
  .brand small {
    display: block; font-family: 'Patrick Hand'; font-size: 16px;
    color: var(--muted); margin-top: 4px; letter-spacing: 0.5px;
  }
  .meta {
    font-family: 'Patrick Hand'; color: var(--muted); font-size: 16px;
    text-align: right; max-width: 480px;
  }
  .meta b { color: var(--ink); font-weight: 400; border-bottom: 1.5px dashed var(--ink); }

  /* tabs */
  .tabs {
    display: flex; gap: 0; align-items: flex-end;
    border-bottom: 2px solid var(--rule);
    margin: 18px 0 28px; padding-left: 4px;
    overflow-x: auto;
  }
  .tab {
    font-family: 'Patrick Hand'; font-size: 20px;
    background: transparent; border: 2px solid var(--rule);
    border-bottom: none;
    padding: 10px 18px 12px;
    margin-right: -2px; margin-bottom: -2px;
    cursor: pointer;
    color: var(--ink-2);
    border-radius: 14px 14px 0 0;
    white-space: nowrap;
    transform: rotate(-0.3deg);
    position: relative; top: 2px;
    background: var(--paper-2);
  }
  .tab:nth-child(even) { transform: rotate(0.4deg); }
  .tab.active {
    background: var(--paper);
    color: var(--ink);
    font-weight: 700;
    top: 0;
    box-shadow: 0 -2px 0 var(--paper);
  }
  .tab .k { color: var(--accent); font-family: 'Caveat'; font-size: 22px; margin-right: 6px; font-weight: 700; }

  /* variant header */
  .variant-head {
    display: flex; gap: 22px; align-items: flex-start;
    margin: 6px 4px 22px;
  }
  .variant-head h2 {
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 38px;
    margin: 0; line-height: 1; letter-spacing: -0.5px;
  }
  .variant-head .why {
    border-left: 2px solid var(--rule);
    padding-left: 16px;
    max-width: 700px;
    color: var(--ink-2);
    font-size: 17px;
  }
  .variant-head .why b { color: var(--accent); font-weight: 400; border-bottom: 1.5px solid var(--accent); }

  /* sheet (a single screen) */
  .grid { display: grid; gap: 28px; }
  .grid.cols-2 { grid-template-columns: 1.05fr 1fr; }
  .grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .grid.cols-wide { grid-template-columns: 1.4fr 1fr; }

  .sheet {
    background: #fffdf7;
    border: 2.5px solid var(--rule);
    border-radius: 14px;
    padding: 18px 18px 22px;
    position: relative;
    box-shadow:
      2px 3px 0 var(--rule),
      6px 8px 0 rgba(26, 24, 20, 0.06);
    transform: rotate(-0.25deg);
  }
  .sheet.tilt-r { transform: rotate(0.4deg); }
  .sheet.tilt-0 { transform: rotate(0deg); }

  .sheet-label {
    position: absolute; top: -14px; left: 18px;
    background: var(--accent); color: #fffdf7;
    padding: 2px 12px 4px; border-radius: 999px;
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 20px;
    border: 2px solid var(--rule); line-height: 1;
    transform: rotate(-2deg);
  }
  .sheet-cap {
    position: absolute; bottom: -12px; right: 16px;
    background: #fffdf7; padding: 0 8px;
    font-family: 'Caveat', cursive; font-size: 19px; color: var(--ink-2);
  }
  .sheet-cap::before { content: '✎ '; color: var(--accent); }

  /* mini browser frame */
  .bw {
    border: 2px solid var(--rule); border-radius: 8px; overflow: hidden;
    background: #fffdf7;
  }
  .bw-head {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-bottom: 2px solid var(--rule);
    background: var(--paper-2);
  }
  .bw-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--rule); }
  .bw-url {
    flex: 1; margin-left: 8px; padding: 3px 10px;
    border: 1.5px solid var(--rule); border-radius: 999px;
    background: #fffdf7; font-size: 14px; color: var(--muted);
    font-family: 'Patrick Hand';
  }
  .bw-body { padding: 14px; }

  /* nav inside wireframe */
  .wf-nav {
    display: flex; align-items: center; gap: 14px;
    padding-bottom: 10px; border-bottom: 1.5px dashed var(--rule);
    margin-bottom: 12px;
  }
  .wf-nav .logo {
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 24px;
  }
  .wf-nav .spacer { flex: 1; }
  .wf-nav .link { font-size: 15px; color: var(--ink-2); }
  .wf-nav .pill {
    border: 1.8px solid var(--rule); border-radius: 999px;
    padding: 3px 12px; font-size: 14px;
  }
  .wf-nav .pill.solid { background: var(--ink); color: #fffdf7; border-color: var(--ink); }

  /* generic shapes */
  .row { display: flex; gap: 10px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .stack-tight { display: flex; flex-direction: column; gap: 4px; }
  .hr { height: 0; border-top: 1.5px dashed var(--rule); margin: 10px 0; }
  .scribble {
    height: 8px;
    background:
      radial-gradient(circle at 4px 4px, var(--rule) 1px, transparent 1.5px) 0 0/8px 8px;
    border-bottom: 1.5px solid transparent;
    opacity: .35;
  }
  .line { height: 9px; background: var(--rule); opacity: .55; border-radius: 2px; }
  .line.short { width: 38%; }
  .line.mid { width: 62%; }
  .line.long { width: 82%; }
  .line.full { width: 100%; }
  .line.faint { opacity: .25; }
  .line.thin { height: 6px; opacity: .35; }

  .cover {
    background:
      repeating-linear-gradient(45deg, rgba(26,24,20,.08) 0 6px, transparent 6px 12px),
      var(--paper-2);
    border: 1.8px solid var(--rule);
    border-radius: 4px;
    aspect-ratio: 2/3;
    display: flex; align-items: flex-end; padding: 6px;
    font-family: 'Caveat'; font-size: 15px; color: var(--ink-2);
    position: relative;
  }
  .cover::after {
    content: '📖'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); opacity: .25; font-size: 28px;
    filter: grayscale(1);
  }
  .cover.sm { aspect-ratio: 2/3; }

  .chip {
    display: inline-block;
    border: 1.8px solid var(--rule); border-radius: 999px;
    padding: 1px 9px; font-size: 13px; background: var(--paper);
    font-family: 'Patrick Hand'; white-space: nowrap;
  }
  .chip.acc { background: var(--accent); color: #fffdf7; border-color: var(--rule); }
  .chip.dot::before { content: '•'; margin-right: 5px; color: var(--accent); }

  .btn {
    display: inline-block;
    border: 2px solid var(--rule); border-radius: 8px;
    padding: 6px 14px; font-family: 'Patrick Hand'; font-size: 15px;
    background: #fffdf7; cursor: default;
  }
  .btn.primary { background: var(--ink); color: #fffdf7; border-color: var(--ink); }
  .btn.acc { background: var(--accent); color: #fffdf7; border-color: var(--rule); }
  .btn.ghost { background: transparent; }
  .btn.full { width: 100%; text-align: center; }

  .field {
    border: 1.8px solid var(--rule); border-radius: 8px;
    padding: 8px 12px; font-family: 'Patrick Hand'; color: var(--muted);
    background: #fffdf7; font-size: 15px;
  }

  .card {
    border: 1.8px solid var(--rule); border-radius: 10px; padding: 10px 12px;
    background: #fffdf7;
  }
  .card h4 { margin: 0 0 4px; font-family: 'Patrick Hand'; font-size: 16px; font-weight: 400; }
  .card .sub { color: var(--muted); font-size: 14px; }

  .annot {
    font-family: 'Caveat', cursive; font-size: 19px; color: var(--accent);
    display: inline-flex; align-items: center; gap: 6px;
    transform: rotate(-1deg);
  }
  .annot .arrow { font-size: 22px; }
  .annotation-row {
    margin: 10px 0 4px; display: flex; gap: 14px; align-items: center;
    border-top: 1.5px dashed var(--accent); padding-top: 8px;
  }
  .annotation-row .lead { color: var(--accent); font-family: 'Caveat'; font-size: 20px; font-weight: 700; }

  /* avatar pic */
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background:
      repeating-linear-gradient(45deg, rgba(26,24,20,.1) 0 4px, transparent 4px 8px),
      var(--paper-2);
    border: 1.8px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat'; font-weight: 700; color: var(--ink-2);
    font-size: 16px;
    flex-shrink: 0;
  }
  .avatar.lg { width: 56px; height: 56px; font-size: 22px; }
  .avatar.xl { width: 80px; height: 80px; font-size: 28px; }
  .avatar.acc { background: var(--accent); color: #fffdf7; border-color: var(--rule); }

  /* --- variant-specific helpers --- */
  .catalog-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .catalog-grid .book .cover { margin-bottom: 6px; }
  .catalog-grid .book .t { font-size: 14px; font-weight: 700; }
  .catalog-grid .book .a { font-size: 13px; color: var(--muted); }

  /* graph */
  .graph-wrap { position: relative; aspect-ratio: 1.2/1; }
  .graph-wrap svg { width: 100%; height: 100%; display: block; }

  /* chat bubbles */
  .bubble {
    border: 1.8px solid var(--rule); border-radius: 14px;
    padding: 8px 12px; max-width: 78%; background: #fffdf7;
    font-size: 14.5px;
  }
  .bubble.me { background: var(--ink); color: #fffdf7; border-color: var(--ink); align-self: flex-end; }
  .bubble.ai { background: var(--paper-2); }
  .bubble.ai .src { display: block; margin-top: 6px; font-size: 12px; color: var(--muted); font-family: 'Patrick Hand'; }

  /* character first cards */
  .char-card {
    border: 2px solid var(--rule); border-radius: 12px; padding: 12px;
    background: #fffdf7; display: flex; gap: 12px;
  }
  .char-card .meta-lines { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .char-card .role { font-size: 13px; color: var(--muted); }
  .char-card .name { font-family: 'Caveat'; font-size: 22px; font-weight: 700; line-height: 1; }
  .char-card .books { font-size: 13px; color: var(--muted); }
  .char-card .books b { color: var(--ink); font-weight: 400; border-bottom: 1.5px dashed var(--rule); }

  /* reader view */
  .reader-page {
    background: #fffdf7; border: 1.8px solid var(--rule); border-radius: 6px;
    padding: 18px 22px; min-height: 360px; position: relative;
    font-family: 'Patrick Hand'; line-height: 1.7; font-size: 14.5px;
    column-count: 1;
  }
  .reader-page p { margin: 0 0 10px; }
  .reader-page .hl {
    background: rgba(217, 79, 30, 0.18);
    border-bottom: 1.5px solid var(--accent);
    cursor: pointer;
  }
  .reader-page .hl.b { background: rgba(42, 111, 219, 0.18); border-bottom-color: var(--accent-2); }
  .margin-note {
    position: relative; padding-left: 18px;
    font-family: 'Caveat'; font-size: 18px; color: var(--ink-2);
    margin-bottom: 14px;
  }
  .margin-note::before {
    content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
    width: 3px; background: var(--accent); border-radius: 2px;
  }
  .margin-note.b::before { background: var(--accent-2); }
  .margin-note .tag {
    display: inline-block; font-family: 'Patrick Hand'; font-size: 12px;
    color: var(--muted); margin-bottom: 2px; letter-spacing: 1px;
  }

  /* legend */
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    font-family: 'Patrick Hand'; font-size: 14px; color: var(--ink-2);
    border-top: 1.5px dashed var(--rule); padding-top: 10px; margin-top: 10px;
  }
  .legend .swatch {
    display: inline-block; width: 14px; height: 14px;
    border: 1.8px solid var(--rule); border-radius: 50%;
    margin-right: 6px; vertical-align: -2px;
  }

  /* note + tagline below grid */
  .footnote {
    margin-top: 24px; font-family: 'Caveat'; font-size: 22px; color: var(--ink-2);
    border-top: 2px dashed var(--rule); padding-top: 14px;
    display: flex; gap: 16px; align-items: flex-start;
  }
  .footnote .label {
    background: var(--ink); color: var(--paper); padding: 2px 10px;
    border-radius: 6px; font-family: 'Patrick Hand'; font-size: 14px;
    letter-spacing: 1px; flex-shrink: 0;
  }

  /* tweaks override */
  .acc-blue { --accent: #2a6fdb; }
  .acc-green { --accent: #1f8a5b; }
  .acc-rose  { --accent: #c8417a; }
  .acc-amber { --accent: #c47a14; }

  .heavy { --rule: #14110d; }
  .heavy .sheet, .heavy .bw, .heavy .cover, .heavy .chip,
  .heavy .btn, .heavy .field, .heavy .card, .heavy .avatar,
  .heavy .tab, .heavy .char-card { border-width: 3px; }
  .heavy .sheet { box-shadow: 3px 4px 0 var(--rule), 7px 9px 0 rgba(0,0,0,.08); }

  /* hide things during single-screen focus printing if needed */
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>

</body>
