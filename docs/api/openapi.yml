      - jwtAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: users_me_settings_partial_update
      tags:
      - users
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
components:
  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        bio:
          type: string
        birth_date:
          type: string
          format: date
          nullable: true
      required:
      - id
      - name
    BlankEnum:
      enum:
      - ''
    BookDetail:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        cover_url:
          type: string
          format: uri
          maxLength: 500
        authors:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        serie:
          allOf:
          - $ref: '#/components/schemas/Serie'
          readOnly: true
        description:
          type: string
        page_count:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
        isbn:
          type: string
          nullable: true
          maxLength: 20
        avg_rating:
          type: number
          format: double
        year:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
        position_in_series:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        ratings_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        created_at:
          type: string
          format: date
          readOnly: true
        updated_at:
          type: string
          format: date
          readOnly: true
      required:
      - authors
      - created_at
      - genres
      - serie
      - tags
      - title
      - updated_at
    BookList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 500
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        cover_url:
          type: string
          format: uri
          maxLength: 500
        authors:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            type: string
        avg_rating:
          type: number
          format: double
        year:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
      required:
      - authors
      - genres
      - id
      - title
    BookWrite:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        year:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
        isbn:
          type: string
          nullable: true
          maxLength: 20
        description:
          type: string
        page_count:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
        cover_url:
          type: string
          format: uri
          maxLength: 500
        serie:
          allOf:
          - $ref: '#/components/schemas/_SerieWrite'
          writeOnly: true
        authors:
          type: array
          items:
            type: string
          writeOnly: true
        genres:
          type: array
          items:
            type: string
          writeOnly: true
        tags:
