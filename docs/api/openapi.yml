      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShelfEntry'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ShelfEntry'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ShelfEntry'
        required: true
      security:
      - jwtAuth: []
