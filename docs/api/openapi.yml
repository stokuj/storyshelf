          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShelfEntry'
          description: ''
    patch:
      operationId: shelf_entries_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - shelf
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedShelfEntry'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedShelfEntry'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedShelfEntry'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShelfEntry'
