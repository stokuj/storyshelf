            application/json:
              schema:
                $ref: '#/components/schemas/Shelf'
          description: ''
  /api/shelves/{slug}/books/{book_slug}/:
    delete:
      operationId: shelves_books_destroy
      parameters:
      - in: path
        name: book_slug
        schema:
          type: string
        required: true
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - shelves
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/tags/:
    get:
      operationId: tags_list
      parameters:
      - name: page
        required: false
        in: query
