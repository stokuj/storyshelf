      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShelfEntry'
          description: ''
    patch:
      operationId: shelf_entries_partial_update
      parameters:
      - in: path
        name: id
