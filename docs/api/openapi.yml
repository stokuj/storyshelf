  /api/u/{handle}/:
    get:
      operationId: u_retrieve
      description: |-
        Publiczny profil użytkownika po handle. Zwraca 404 jeśli profil jest prywatny
        i requestujący nie jest właścicielem.
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      tags:
      - u
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/u/{handle}/follow/:
    post:
      operationId: u_follow_create
      description: |-
        POST: Obserwuj użytkownika o podanym handle.
              400 jeśli próba obserwowania siebie, 409 jeśli już obserwujesz.
        DELETE: Przestań obserwować. 404 jeśli relacja nie istnieje.
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      tags:
      - u
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: u_follow_destroy
      description: |-
        POST: Obserwuj użytkownika o podanym handle.
              400 jeśli próba obserwowania siebie, 409 jeśli już obserwujesz.
        DELETE: Przestań obserwować. 404 jeśli relacja nie istnieje.
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      tags:
      - u
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/u/{handle}/followers/:
    get:
      operationId: u_followers_list
      description: |-
        Płaska lista obserwujących lub obserwowanych dla użytkownika o podanym handle.
        follower_view=True → kto obserwuje tego użytkownika; False → kogo ten użytkownik obserwuje.
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      tags:
      - u
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FollowUser'
          description: ''
  /api/u/{handle}/following/:
    get:
      operationId: u_following_list
      description: |-
        Płaska lista obserwujących lub obserwowanych dla użytkownika o podanym handle.
        follower_view=True → kto obserwuje tego użytkownika; False → kogo ten użytkownik obserwuje.
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      tags:
      - u
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FollowUser'
          description: ''
  /api/u/{handle}/shelf/:
    get:
      operationId: u_shelf_list
      description: Another user's default reading shelf (all statuses), gated by profile_public.
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      tags:
      - u
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicShelfEntry'
          description: ''
  /api/u/{handle}/shelves/:
    get:
      operationId: u_shelves_list
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      tags:
      - u
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicShelf'
          description: ''
  /api/u/{handle}/shelves/{slug}/:
    get:
      operationId: u_shelves_retrieve
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - u
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicShelfDetail'
          description: ''
  /api/users/:
    get:
      operationId: users_list
      description: |-
        Public, paginated list of public profiles. Search by handle/display_name;
        order by follower count (default) or recency.
      parameters:
      - name: ordering
        required: false
