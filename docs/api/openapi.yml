        schema:
          type: string
        required: true
      tags:
      - shelves
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/shelves/{slug}/books/:
    post:
      operationId: shelves_books_create
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - shelves
      requestBody:
        content:
