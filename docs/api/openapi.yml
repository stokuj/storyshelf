      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSerieList'
          description: ''
  /api/series/{id}/:
    get:
      operationId: series_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this serie.
        required: true
      tags:
      - series
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Serie'
          description: ''
  /api/shelf/entries/:
    get:
      operationId: shelf_entries_list
      tags:
      - shelf
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShelfEntry'
          description: ''
    post:
      operationId: shelf_entries_create
      tags:
      - shelf
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShelfEntry'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ShelfEntry'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ShelfEntry'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShelfEntry'
          description: ''
  /api/shelf/entries/{id}/:
    get:
      operationId: shelf_entries_retrieve
      parameters:
      - in: path
