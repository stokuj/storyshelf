  /api/shelves/:
    get:
      operationId: shelves_list
      tags:
      - shelves
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shelf'
          description: ''
    post:
      operationId: shelves_create
      tags:
      - shelves
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Shelf'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Shelf'
          multipart/form-data:
            schema:
