        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
          description: ''
  /api/u/{handle}/:
    get:
      operationId: u_retrieve
      description: |-
        Publiczny profil użytkownika po handle. Zwraca 404 jeśli profil jest prywatny
        i requestujący nie jest właścicielem.
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      tags:
      - u
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/users/{handle}/follow/:
    post:
      operationId: users_follow_create
      description: |-
        POST: Obserwuj użytkownika o podanym handle.
              400 jeśli próba obserwowania siebie, 409 jeśli już obserwujesz.
        DELETE: Przestań obserwować. 404 jeśli relacja nie istnieje.
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      tags:
      - users
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: users_follow_destroy
      description: |-
        POST: Obserwuj użytkownika o podanym handle.
              400 jeśli próba obserwowania siebie, 409 jeśli już obserwujesz.
        DELETE: Przestań obserwować. 404 jeśli relacja nie istnieje.
      parameters:
