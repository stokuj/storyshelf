          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedShelf'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedShelf'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shelf'
          description: ''
    delete:
      operationId: shelves_destroy
      parameters:
