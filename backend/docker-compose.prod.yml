services:
  storyweave-api:
    image: ghcr.io/stokuj/storyweave:main
    container_name: storyweave-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
    volumes:
      - hf-cache:/cache/huggingface
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started

  celery-worker:
    image: ghcr.io/stokuj/storyweave:main
    container_name: storyweave-celery-worker
    command: ["uv", "run", "celery", "-A", "api.config.celery_app:celery", "worker", "--loglevel=info", "--concurrency=8"]
    env_file:
      - .env
    environment:
      APP_ENV: production
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
    volumes:
      - hf-cache:/cache/huggingface
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: storyweave-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
  hf-cache:
