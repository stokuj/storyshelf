<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:replace="~{layout/base :: layout('Profil użytkownika', ~{::content})}">
    <th:block th:ref="content">

        <div class="max-w-lg mx-auto">
            <div class="card bg-base-100 shadow">
                <div class="card-body">
                    <div class="flex items-center gap-4">
                        <div class="avatar">
                            <div class="w-16 rounded-full bg-base-200">
                                <img th:if="${profile.avatarUrl}" th:src="${profile.avatarUrl}" alt="avatar"/>
                            </div>
                        </div>
                        <div>
                            <h1 class="text-xl font-bold" th:text="${profile.username}">username</h1>
                            <p class="text-sm text-base-content/60">
                                Członek od
                                <span th:text="${profile.memberSince != null} ? ${#temporals.format(profile.memberSince, 'yyyy-MM-dd HH:mm')} : '-'">-</span>
                            </p>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div>
                        <h2 class="text-base font-semibold mb-2">O mnie</h2>
                        <p class="text-sm text-base-content/80" th:text="${profile.bio} ?: 'Brak opisu.'">Brak opisu.</p>
                    </div>

                    <div th:if="${isOwner}" class="mt-4">
                        <a href="/settings" class="btn btn-outline btn-sm">Edytuj profil</a>
                    </div>
                </div>
            </div>
        </div>

    </th:block>
</th:block>

</body>
</html>
