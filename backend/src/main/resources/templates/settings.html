<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<th:block th:replace="~{layout/base :: layout('Ustawienia', ~{::content})}">
    <th:block th:ref="content">

        <div class="max-w-lg mx-auto">
            <h1 class="text-2xl font-bold mb-6">Ustawienia konta</h1>

            <div th:if="${settingsMsg}" class="alert alert-success mb-4 text-sm" th:text="${settingsMsg}"></div>

            <div class="card bg-base-100 shadow">
                <div class="card-body">
                    <h2 class="card-title text-base">Konto</h2>
                    <div class="form-control">
                        <label class="label"><span class="label-text">Email</span></label>
                        <input type="text" class="input input-bordered" disabled
                               th:value="${#authentication.name}"/>
                    </div>

                    <div class="divider"></div>

                    <h2 class="card-title text-base">Profil</h2>

                    <div class="flex items-center gap-3 mb-4">
                        <div class="avatar">
                            <div class="w-12 rounded-full bg-base-200">
                                <img th:if="${profileForm.avatarUrl}" th:src="${profileForm.avatarUrl}" alt="avatar"/>
                            </div>
                        </div>
                        <div>
                            <div class="font-semibold" th:text="${settings.username}">username</div>
                            <div class="text-xs text-base-content/60">
                                Profil publiczny: <span th:text="${settings.profilePublic} ? 'tak' : 'nie'">tak</span>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/settings}" th:object="${profileForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="form-control mb-3">
                            <label class="label"><span class="label-text">Username</span></label>
                            <input type="text" class="input input-bordered" th:field="*{username}"/>
                            <p class="text-xs text-error mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                        </div>
                        <div class="form-control mb-3">
                            <label class="label"><span class="label-text">Bio</span></label>
                            <textarea class="textarea textarea-bordered" rows="4" th:field="*{bio}"></textarea>
                            <p class="text-xs text-error mt-1" th:if="${#fields.hasErrors('bio')}" th:errors="*{bio}"></p>
                        </div>
                        <div class="form-control mb-4">
                            <label class="label"><span class="label-text">Avatar URL</span></label>
                            <input type="text" class="input input-bordered" th:field="*{avatarUrl}"/>
                            <p class="text-xs text-error mt-1" th:if="${#fields.hasErrors('avatarUrl')}" th:errors="*{avatarUrl}"></p>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Zapisz profil</button>
                        <a class="btn btn-ghost btn-sm" th:href="@{'/profile/' + ${settings.username}}">Zobacz profil</a>
                    </form>

                    <div class="divider"></div>

                    <form th:action="@{/settings/visibility}" method="post" class="flex items-center gap-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="profilePublic" th:value="${!settings.profilePublic}"/>
                        <span class="text-sm">Widoczność profilu:</span>
                        <button type="submit" class="btn btn-outline btn-sm"
                                th:text="${settings.profilePublic} ? 'Ustaw prywatny' : 'Ustaw publiczny'"></button>
                    </form>

                    <div class="divider"></div>

                    <h2 class="card-title text-base">Wyloguj się</h2>
                    <p class="text-sm text-base-content/60 mb-3">Zakończ bieżącą sesję.</p>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline btn-error btn-sm">Wyloguj</button>
                    </form>
                </div>
            </div>
        </div>

    </th:block>
</th:block>

</body>
</html>
