<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:replace="~{layout/base :: layout('Rejestracja', ~{::content})}">
    <th:block th:ref="content">

        <div class="max-w-sm mx-auto mt-8">
            <h1 class="text-2xl font-bold text-center mb-6">Utwórz konto</h1>

            <div th:if="${registerError}" class="alert alert-error mb-4 text-sm" th:text="${registerError}"></div>

            <div class="card bg-base-100 shadow">
                <div class="card-body">

                    <form th:action="@{/register}" method="post">
                        <div class="form-control mb-4">
                            <label class="label"><span class="label-text">Email</span></label>
                            <input type="email" name="email" class="input input-bordered"
                                   placeholder="twoj@email.pl" required autofocus/>
                        </div>
                        <div class="form-control mb-4">
                            <label class="label">
                                <span class="label-text">Hasło</span>
                                <span class="label-text-alt text-base-content/50">min. 6 znaków</span>
                            </label>
                            <input type="password" name="password" id="password" class="input input-bordered"
                                   placeholder="••••••••" minlength="6" required/>
                        </div>
                        <div class="form-control mb-6">
                            <label class="label"><span class="label-text">Potwierdź hasło</span></label>
                            <input type="password" id="confirmPassword" class="input input-bordered"
                                   placeholder="••••••••" minlength="6" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-full">Zarejestruj się</button>
                    </form>

                    <p class="text-center text-sm mt-4">
                        Masz już konto? <a href="/login" class="link link-primary">Zaloguj się</a>
                    </p>

                </div>
            </div>
        </div>

        <script>
            const form = document.querySelector('form');
            const password = document.getElementById('password');
            const confirm = document.getElementById('confirmPassword');
            form.addEventListener('submit', function(e) {
                if (password.value !== confirm.value) {
                    e.preventDefault();
                    confirm.setCustomValidity('Hasła nie są identyczne.');
                    confirm.reportValidity();
                } else {
                    confirm.setCustomValidity('');
                }
            });
        </script>

    </th:block>
</th:block>

</body>
</html>
