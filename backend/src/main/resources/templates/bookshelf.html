<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:replace="~{layout/base :: layout('Moja półka', ~{::content})}">
    <th:block th:ref="content">

        <div class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold mb-1">Moja półka</h1>
                <p class="text-base-content/60" th:text="${#lists.size(entries)} + ' książek'">0 książek</p>
            </div>
            <a href="/" class="btn btn-outline btn-sm">Przeglądaj katalog</a>
        </div>

        <!-- Taby filtrowania -->
        <div class="tabs tabs-box mb-6" role="tablist">
            <a class="tab" href="?filter=ALL"
               th:classappend="${param.filter == null or param.filter[0] == 'ALL'} ? 'tab-active' : ''">Wszystkie</a>
            <a class="tab" href="?filter=WANT_TO_READ"
               th:classappend="${param.filter != null and param.filter[0] == 'WANT_TO_READ'} ? 'tab-active' : ''">Chcę przeczytać</a>
            <a class="tab" href="?filter=READING"
               th:classappend="${param.filter != null and param.filter[0] == 'READING'} ? 'tab-active' : ''">Czytam</a>
            <a class="tab" href="?filter=READ"
               th:classappend="${param.filter != null and param.filter[0] == 'READ'} ? 'tab-active' : ''">Przeczytane</a>
        </div>

        <!-- Lista -->
        <div class="flex flex-col gap-3" th:if="${not #lists.isEmpty(entries)}">
            <div th:each="entry : ${entries}"
                 th:if="${param.filter == null or param.filter[0] == 'ALL' or param.filter[0] == entry.status.name()}"
                 class="card bg-base-100 shadow-sm hover:shadow transition-shadow">
                <div class="card-body p-4 flex flex-row items-center gap-4">

                    <a th:href="@{/book/{id}(id=${entry.book.id})}" class="shrink-0">
                        <div class="bg-gradient-to-br from-primary/20 to-secondary/20 rounded w-12 h-16 flex items-end p-1">
                            <span class="text-xs font-semibold line-clamp-2 leading-tight" th:text="${entry.book.title}">T</span>
                        </div>
                    </a>

                    <div class="flex-1 min-w-0">
                        <a th:href="@{/book/{id}(id=${entry.book.id})}"
                           class="font-semibold hover:underline line-clamp-1"
                           th:text="${entry.book.title}">Tytuł</a>
                        <p class="text-sm text-base-content/60" th:text="${entry.book.author}">Autor</p>
                    </div>

                    <!-- Zmiana statusu -->
                    <form th:action="@{/shelf/{id}/status(id=${entry.book.id})}" method="post"
                          class="flex items-center gap-2 shrink-0">
                        <input type="hidden" name="returnTo" value="/bookshelf"/>
                        <select name="status" class="select select-bordered select-sm" onchange="this.form.submit()">
                            <option th:each="s : ${statuses}"
                                    th:value="${s}"
                                    th:text="${s.name().replace('_', ' ')}"
                                    th:selected="${s == entry.status}">status</option>
                        </select>
                    </form>

                    <!-- Usuń -->
                    <form th:action="@{/shelf/{id}/remove(id=${entry.book.id})}" method="post" class="shrink-0">
                        <input type="hidden" name="returnTo" value="/bookshelf"/>
                        <button type="submit" class="btn btn-ghost btn-sm text-error" title="Usuń z półki">✕</button>
                    </form>

                </div>
            </div>
        </div>

        <!-- Pusty stan -->
        <div th:if="${#lists.isEmpty(entries)}" class="text-center py-20">
            <p class="text-base-content/40 text-lg mb-4">Twoja półka jest pusta.</p>
            <a href="/" class="btn btn-primary">Przeglądaj katalog</a>
        </div>

    </th:block>
</th:block>

</body>
</html>
