<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:replace="~{layout/base :: layout('Zaloguj się', ~{::content})}">
    <th:block th:ref="content">

        <div class="max-w-sm mx-auto mt-8">
            <h1 class="text-2xl font-bold text-center mb-6">Zaloguj się</h1>

            <div th:if="${loginError}" class="alert alert-error mb-4 text-sm" th:text="${loginError}"></div>
            <div th:if="${logoutMsg}" class="alert alert-success mb-4 text-sm" th:text="${logoutMsg}"></div>
            <div th:if="${registeredMsg}" class="alert alert-success mb-4 text-sm" th:text="${registeredMsg}"></div>

            <div class="card bg-base-100 shadow">
                <div class="card-body">

                    <form th:action="@{/login}" method="post">
                        <div class="form-control mb-4">
                            <label class="label"><span class="label-text">Email</span></label>
                            <input type="email" name="username" class="input input-bordered"
                                   placeholder="twoj@email.pl" required autofocus/>
                        </div>
                        <div class="form-control mb-6">
                            <label class="label"><span class="label-text">Hasło</span></label>
                            <input type="password" name="password" class="input input-bordered"
                                   placeholder="••••••••" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-full">Zaloguj</button>
                    </form>

                    <div class="divider text-xs">lub</div>

                    <a href="/oauth2/authorization/github" class="btn btn-outline w-full gap-2">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                        </svg>
                        Zaloguj przez GitHub
                    </a>

                    <p class="text-center text-sm mt-4">
                        Nie masz konta? <a href="/register" class="link link-primary">Zarejestruj się</a>
                    </p>

                </div>
            </div>
        </div>

    </th:block>
</th:block>

</body>
</html>
