<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:replace="~{layout/base :: layout('Zaloguj się', ~{::content})}">
    <th:block th:ref="content">

        <div class="max-w-sm mx-auto mt-8">
            <h1 class="text-2xl font-bold text-center mb-6">Zaloguj się</h1>

            <div th:if="${loginError}" class="alert alert-error mb-4 text-sm" th:text="${loginError}"></div>
            <div th:if="${logoutMsg}" class="alert alert-success mb-4 text-sm" th:text="${logoutMsg}"></div>
            <div th:if="${registeredMsg}" class="alert alert-success mb-4 text-sm" th:text="${registeredMsg}"></div>

            <div class="card bg-base-100 shadow">
                <div class="card-body">

                    <form th:action="@{/login}" method="post">
                        <div class="form-control mb-4">
                            <label class="label"><span class="label-text">Email</span></label>
                            <input type="email" name="username" class="input input-bordered"
                                   placeholder="twoj@email.pl" required autofocus/>
                        </div>
                        <div class="form-control mb-6">
                            <label class="label"><span class="label-text">Hasło</span></label>
                            <input type="password" name="password" class="input input-bordered"
                                   placeholder="••••••••" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-full">Zaloguj</button>
                    </form>

                    <p class="text-center text-sm mt-4">
                        Nie masz konta? <a href="/register" class="link link-primary">Zarejestruj się</a>
                    </p>

                </div>
            </div>
        </div>

    </th:block>
</th:block>

</body>
</html>
