<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<th:block th:replace="~{layout/base :: layout(${book.title}, ~{::content})}">
    <th:block th:ref="content">

        <div class="max-w-4xl mx-auto">

            <!-- Breadcrumb -->
            <div class="breadcrumbs text-sm mb-6">
                <ul>
                    <li><a href="/">Katalog</a></li>
                    <li th:text="${book.title}">Tytuł</li>
                </ul>
            </div>

            <div class="flex flex-col md:flex-row gap-8">

                <!-- Okładka -->
                <div class="shrink-0">
                    <div class="bg-gradient-to-br from-primary/20 to-secondary/20 rounded-box w-48 h-72 flex items-end p-4">
                        <div>
                            <p class="font-bold text-sm" th:text="${book.title}">Tytuł</p>
                            <p class="text-xs text-base-content/60 mt-1" th:text="${book.author}">Autor</p>
                        </div>
                    </div>
                </div>

                <!-- Informacje -->
                <div class="flex-1">
                    <h1 class="text-3xl font-bold mb-1" th:text="${book.title}">Tytuł</h1>
                    <p class="text-xl text-base-content/70 mb-4" th:text="${book.author}">Autor</p>

                    <!-- Metadane -->
                    <div class="flex flex-wrap gap-3 mb-5 text-sm text-base-content/60">
                        <span th:if="${book.year}" th:text="${book.year}"></span>
                        <span th:if="${book.pageCount}" th:text="${book.pageCount} + ' stron'"></span>
                        <span th:if="${book.isbn}" th:text="'ISBN: ' + ${book.isbn}"></span>
                    </div>

                    <!-- Gatunki -->
                    <div th:if="${not #sets.isEmpty(book.genres)}" class="flex flex-wrap gap-2 mb-5">
                        <span th:each="genre : ${book.genres}" class="badge badge-outline" th:text="${genre}">gatunek</span>
                    </div>

                    <!-- Ocena -->
                    <div th:if="${book.rating != null and book.rating > 0}" class="flex items-center gap-2 mb-5">
                        <div class="rating rating-sm">
                            <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                <input type="radio" class="mask mask-star-2 bg-orange-400" disabled
                                       th:checked="${i <= book.rating}"/>
                            </th:block>
                        </div>
                        <span class="text-sm text-base-content/60"
                              th:text="${#numbers.formatDecimal(book.rating, 1, 1)} + ' (' + ${book.ratingsCount} + ' ocen)'"></span>
                    </div>

                    <!-- Panel półki -->
                    <div class="card bg-base-100 shadow-sm p-4 mb-6 max-w-sm">

                        <div th:if="${shelfMsg}" class="alert alert-warning mb-3 text-sm" th:text="${shelfMsg}"></div>

                        <!-- Już na półce -->
                        <div th:if="${shelfEntry != null}">
                            <p class="text-sm text-base-content/60 mb-2">Na Twojej półce:</p>
                            <form th:action="@{/shelf/{id}/status(id=${book.id})}" method="post" class="flex gap-2 mb-2">
                                <input type="hidden" name="returnTo" th:value="@{/book/{id}(id=${book.id})}"/>
                                <select name="status" class="select select-bordered select-sm flex-1">
                                    <option th:each="s : ${statuses}"
                                            th:value="${s}"
                                            th:text="${s.name().replace('_', ' ')}"
                                            th:selected="${s == shelfEntry.status}">status</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-primary">Zapisz</button>
                            </form>
                            <form th:action="@{/shelf/{id}/remove(id=${book.id})}" method="post">
                                <input type="hidden" name="returnTo" th:value="@{/book/{id}(id=${book.id})}"/>
                                <button type="submit" class="btn btn-sm btn-outline btn-error w-full">Usuń z półki</button>
                            </form>
                        </div>

                        <!-- Nie na półce, zalogowany -->
                        <div th:if="${shelfEntry == null}">
                            <th:block sec:authorize="isAuthenticated()">
                                <form th:action="@{/shelf/{id}/add(id=${book.id})}" method="post">
                                    <select name="status" class="select select-bordered select-sm w-full mb-2">
                                        <option th:each="s : ${statuses}"
                                                th:value="${s}"
                                                th:text="${s.name().replace('_', ' ')}">status</option>
                                    </select>
                                    <button type="submit" class="btn btn-primary w-full">Dodaj do półki</button>
                                </form>
                            </th:block>
                            <th:block sec:authorize="isAnonymous()">
                                <a href="/login" class="btn btn-primary w-full">Zaloguj się, aby dodać do półki</a>
                            </th:block>
                        </div>

                    </div>

                    <!-- Upload treści -->
                    <th:block sec:authorize="isAuthenticated()">
                        <div class="card bg-base-100 shadow-sm p-4 mb-6 max-w-sm">
                            <h2 class="text-sm font-semibold mb-3">Wgraj treść książki</h2>
                            <form id="content-upload-form" class="space-y-3">
                                <input id="content-file" type="file" accept=".txt,text/plain"
                                       class="file-input file-input-bordered w-full"/>
                                <button type="submit" class="btn btn-sm btn-primary w-full">Wyślij plik</button>
                                <p class="text-xs text-base-content/60">
                                    Obsługiwany format: .txt (text/plain)
                                </p>
                            </form>
                            <div id="content-upload-status" class="text-xs mt-2"></div>
                        </div>
                    </th:block>

                    <!-- Opis -->
                    <div th:if="${book.description}">
                        <h2 class="text-lg font-semibold mb-2">Opis</h2>
                        <p class="text-base-content/80 leading-relaxed" th:text="${book.description}">Opis.</p>
                    </div>

                    <!-- Tagi -->
                    <div th:if="${not #lists.isEmpty(book.tags)}" class="flex flex-wrap gap-2 mt-4">
                        <span th:each="tag : ${book.tags}" class="badge badge-ghost text-xs" th:text="${tag}">tag</span>
                    </div>

                </div>
            </div>
        </div>

    </th:block>
</th:block>

<script th:inline="javascript">
    const contentUploadForm = document.getElementById("content-upload-form");
    if (contentUploadForm) {
        const statusEl = document.getElementById("content-upload-status");
        const fileInput = document.getElementById("content-file");
        const bookId = [[${book.id}]];

        contentUploadForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const file = fileInput.files[0];
            if (!file) {
                statusEl.className = "text-xs mt-2 text-error";
                statusEl.textContent = "Wybierz plik .txt przed wysłaniem.";
                return;
            }

            try {
                statusEl.className = "text-xs mt-2 text-base-content/60";
                statusEl.textContent = "Wysyłanie treści...";

                const content = await file.text();
                const response = await fetch(`/api/books/${bookId}/content`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain"
                    },
                    body: content
                });

                if (!response.ok) {
                    throw new Error("Upload failed");
                }

                statusEl.className = "text-xs mt-2 text-success";
                statusEl.textContent = "Treść została wgrana.";
            } catch (error) {
                statusEl.className = "text-xs mt-2 text-error";
                statusEl.textContent = "Nie udało się wgrać treści.";
            }
        });
    }
</script>

</body>
</html>
