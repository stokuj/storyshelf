<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<th:block th:replace="~{layout/base :: layout('Katalog', ~{::content})}">
    <th:block th:ref="content">

        <div class="mb-8">
            <h1 class="text-3xl font-bold mb-1">Katalog książek</h1>
            <p class="text-base-content/60" th:text="${#lists.size(books)} + ' książek w katalogu'">0 książek</p>
        </div>

        <!-- Siatka książek -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
            <div th:each="book : ${books}" class="card bg-base-100 shadow hover:shadow-md transition-shadow">
                <a th:href="@{/book/{id}(id=${book.id})}" class="block">
                    <div class="bg-gradient-to-br from-primary/20 to-secondary/20 rounded-t-box aspect-[2/3] flex items-end p-3">
                        <div>
                            <p class="font-semibold text-sm line-clamp-2" th:text="${book.title}">Tytuł</p>
                            <p class="text-xs text-base-content/60 mt-1" th:text="${book.author}">Autor</p>
                        </div>
                    </div>
                </a>
                <div class="card-body p-3">
                    <!-- Status jeśli na półce -->
                    <th:block th:if="${shelfEntries != null}" th:each="entry : ${shelfEntries}">
                        <span th:if="${entry.book.id == book.id}"
                              class="badge badge-sm badge-success"
                              th:text="${entry.status.name().replace('_', ' ')}">Na półce</span>
                    </th:block>
                    <!-- Dodaj do półki (zalogowany) -->
                    <th:block sec:authorize="isAuthenticated()">
                        <th:block th:if="${shelfEntries != null}">
                            <form th:action="@{/shelf/{id}/add(id=${book.id})}" method="post"
                                  th:unless="${#lists.contains(shelfEntries.![book.id], book.id)}">
                                <button type="submit" class="btn btn-xs btn-outline btn-primary w-full mt-1">+ Dodaj</button>
                            </form>
                        </th:block>
                    </th:block>
                </div>
            </div>
        </div>

        <!-- Pusty stan -->
        <div th:if="${#lists.isEmpty(books)}" class="text-center py-20">
            <p class="text-base-content/40 text-lg">Brak książek w katalogu.</p>
        </div>

    </th:block>
</th:block>

</body>
</html>
