<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<th:block th:replace="~{layout/base :: layout('Recenzje', ~{::content})}">
    <th:block th:ref="content">
        <div class="max-w-5xl mx-auto">
            <h1 class="text-2xl font-bold mb-4">Recenzje</h1>

            <div th:if="${reviewMsg}" class="alert alert-success mb-4 text-sm" th:text="${reviewMsg}"></div>

            <div class="card bg-base-100 shadow-sm p-4">
                <div class="overflow-x-auto">
                    <table class="table table-sm">
                        <thead>
                        <tr>
                            <th>Książka</th>
                            <th>Użytkownik</th>
                            <th>Ocena</th>
                            <th>Recenzja</th>
                            <th>Data</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="review : ${reviews}">
                            <td th:text="${review.bookTitle}">Tytuł</td>
                            <td th:text="${review.username}">user</td>
                            <td th:text="${review.rating}">5</td>
                            <td th:text="${review.content != null ? review.content : '-'}">treść</td>
                            <td th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">data</td>
                            <td>
                                <form th:action="@{/admin/reviews/{id}/delete(id=${review.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-xs btn-error">Usuń</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(reviews)}">
                            <td colspan="6" class="text-center text-sm text-base-content/60">Brak recenzji.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </th:block>
</th:block>

</body>
</html>
