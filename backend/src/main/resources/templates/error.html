<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:replace="~{layout/base :: layout(${status} + ' — Błąd', ~{::content})}">
    <th:block th:ref="content">

        <div class="max-w-md mx-auto text-center py-20">
            <p class="text-8xl font-black text-base-content/10 mb-4" th:text="${status}">500</p>
            <h1 class="text-2xl font-bold mb-2" th:text="${error}">Błąd</h1>
            <p class="text-base-content/60 mb-8"
               th:text="${message} ?: 'Coś poszło nie tak. Spróbuj ponownie.'">Szczegóły.</p>
            <div class="flex gap-3 justify-center">
                <a href="/" class="btn btn-primary">Strona główna</a>
                <button onclick="history.back()" class="btn btn-ghost">Wróć</button>
            </div>
        </div>

    </th:block>
</th:block>

</body>
</html>
