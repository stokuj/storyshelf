# Docker Compose configuration for development environment
# Uses dev services plus builds form ..storyweave . VM has separate docker-compose for production with more services.

services:
  springshelf:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    image: springshelf:local
    container_name: springshelf
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-booksdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-secret-key}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started

  storyweave-api:
    build:
      context: ../storyweave
      dockerfile: Dockerfile
    image: storyweave:local
    pull_policy: build
    container_name: storyweave-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRINGSHELF_BASE_URL: http://springshelf:8080
    volumes:
      - hf-cache:/cache/huggingface
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_started

  celery-worker:
    build:
      context: ../storyweave
      dockerfile: Dockerfile
    image: storyweave:local
    pull_policy: build
    container_name: storyweave-celery-worker
    command: ["uv", "run", "celery", "-A", "api.config.celery_app:celery", "worker", "--loglevel=info"]
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
    volumes:
      - hf-cache:/cache/huggingface
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started

  db:
    image: postgres:16
    container_name: books-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booksdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret-key}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-booksdb}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: storyweave-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
  hf-cache:
  kafka-data:
