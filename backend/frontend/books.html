<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ksiazki - SpringShelf</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<main class="container">
    <header class="row between">
        <h1>Biblioteka</h1>
        <button id="logout-btn" type="button" class="secondary">Wyloguj</button>
    </header>

    <p id="user-info" class="message"></p>

    <section class="panel">
        <h2>Dodaj ksiazke</h2>
        <form id="book-form" class="grid-form">
            <label>
                Tytul
                <input type="text" name="title" required>
            </label>
            <label>
                Autor
                <input type="text" name="author" required>
            </label>
            <label>
                Rok
                <input type="number" name="year" min="1" required>
            </label>
            <button type="submit">Zapisz</button>
        </form>
    </section>

    <section class="panel">
        <h2>Lista ksiazek</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Tytul</th>
                <th>Autor</th>
                <th>Rok</th>
                <th>Akcje</th>
            </tr>
            </thead>
            <tbody id="books-body"></tbody>
        </table>
    </section>

    <p id="message" class="message"></p>
</main>
<script type="module" src="assets/js/books.js"></script>
</body>
</html>
