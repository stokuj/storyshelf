components:
  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        bio:
          type: string
        birth_date:
          type: string
          format: date
          nullable: true
      required:
      - id
      - name
    BlankEnum:
      enum:
      - ''
    BookDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        title:
          type: string
          maxLength: 500
        author:
          type: string
          readOnly: true
        year:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
        isbn:
          type: string
          nullable: true
          maxLength: 20
        description:
          type: string
        page_count:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
        genres:
          type: string
          readOnly: true
        tags:
          type: string
          readOnly: true
        avg_rating:
          type: number
          format: double
        ratingsCount:
          type: integer
      required:
      - author
      - genres
      - id
      - ratingsCount
      - tags
      - title
    BookList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        title:
          type: string
          maxLength: 500
        author:
          type: string
          readOnly: true
        year:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
        isbn:
          type: string
          nullable: true
          maxLength: 20
        description:
          type: string
        page_count:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
        genres:
          type: string
          readOnly: true
        tags:
          type: string
          readOnly: true
        avg_rating:
          type: number
          format: double
        ratings_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
      required:
      - author
      - genres
      - id
      - tags
      - title
    BookPreview:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        title:
          type: string
          maxLength: 500
        author:
          type: string
          readOnly: true
        avg_rating:
          type: number
          format: double
      required:
      - author
      - id
      - title
    Follow:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        follower_handle:
          type: string
          readOnly: true
        following_handle:
          type: string
          readOnly: true
        followed_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - followed_at
      - follower_handle
      - following_handle
      - id
    Genre:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
      required:
      - id
      - name
    NullEnum:
      enum:
      - null
    PaginatedBookListList:
      type: object
      required:
      - data
      - page
      - per_page
      - total
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BookList'
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
    PaginatedReviewList:
      type: object
      required:
      - data
      - page
      - per_page
      - total
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
    PatchedReview:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        handle:
          type: string
          readOnly: true
        rating:
          type: integer
          maximum: 5
          minimum: 1
        content:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        bookTitle:
          type: string
          readOnly: true
        bookId:
          type: integer
          readOnly: true
    PatchedShelfCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 80
        description:
          type: string
          maxLength: 500
        is_public:
          type: boolean
    Register:
      type: object
      properties:
        email:
          type: string
          format: email
        handle:
          type: string
          maxLength: 30
          pattern: ^[a-z]{3,30}$
        display_name:
          type: string
          default: ''
          maxLength: 80
        password:
          type: string
          writeOnly: true
          maxLength: 72
          minLength: 6
      required:
      - email
      - handle
      - password
    Review:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        handle:
          type: string
          readOnly: true
        rating:
          type: integer
          maximum: 5
          minimum: 1
        content:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        bookTitle:
          type: string
          readOnly: true
        bookId:
          type: integer
          readOnly: true
      required:
      - bookId
      - bookTitle
      - content
      - createdAt
      - handle
      - id
      - rating
    ReviewCreate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        rating:
          type: integer
          maximum: 5
          minimum: 1
        content:
          type: string
          maxLength: 2000
        bookId:
          type: integer
      required:
      - bookId
      - content
      - id
      - rating
    ScopedReviewCreate:
      type: object
      description: Review create for scoped endpoint /books/:id/reviews/. Book injected
        from URL.
      properties:
        id:
          type: integer
          readOnly: true
        rating:
          type: integer
          maximum: 5
          minimum: 1
        content:
          type: string
          maxLength: 2000
      required:
      - content
      - id
      - rating
    Series:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        status:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/SeriesStatusEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
      required:
      - id
      - name
    SeriesStatusEnum:
      enum:
      - ONGOING
      - COMPLETED
      - CANCELLED
      - HIATUS
      type: string
      description: |-
        * `ONGOING` - Ongoing
        * `COMPLETED` - Completed
        * `CANCELLED` - Cancelled
        * `HIATUS` - Hiatus
    Shelf:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 80
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
          maxLength: 500
        is_public:
          type: boolean
        book_count:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - book_count
      - created_at
      - id
      - is_public
      - name
      - slug
      - updated_at
    ShelfCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 80
        description:
          type: string
          maxLength: 500
        is_public:
          type: boolean
      required:
      - name
    ShelfDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 80
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
          maxLength: 500
        is_public:
          type: boolean
        book_count:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        books:
          type: string
          readOnly: true
      required:
      - book_count
      - books
      - created_at
      - id
      - is_public
      - name
      - slug
      - updated_at
    ShelfEntry:
      type: object
      properties:
        book:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/ShelfEntryStatusEnum'
        createdAt:
          type: string
          format: date-time
          readOnly: true
      required:
      - book
      - createdAt
    ShelfEntryStatusEnum:
      enum:
      - WANT_TO_READ
      - READING
      - READ
      type: string
      description: |-
        * `WANT_TO_READ` - Want To Read
        * `READING` - Reading
        * `READ` - Read
    UserProfile:
      type: object
      properties:
        handle:
          type: string
          maxLength: 30
        display_name:
          type: string
          maxLength: 80
        bio:
          type: string
          maxLength: 500
        avatar_url:
          type: string
          readOnly: true
        member_since:
          type: string
          format: date-time
          readOnly: true
        profile_public:
          type: boolean
      required:
      - avatar_url
      - handle
      - member_since
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
