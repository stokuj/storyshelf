openapi: 3.0.3
info:
  title: StoryShelf API
  version: 1.0.0
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: 'Logowanie. Ustawia HttpOnly cookies. Pola: email, password.'
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Wylogowanie. Czyści cookies i blacklistuje refresh token.
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: 'Zwraca stan sesji: authenticated, email, handle. Używane do inicjalizacji
        auth w SPA.'
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: Odświeża access token z HttpOnly refresh cookie. Ustawia nowe cookies.
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: 'Rejestracja nowego użytkownika. Pola: email, handle, password.'
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/authors/:
    get:
      operationId: authors_list
      description: Płaska lista wszystkich autorów. Tylko odczyt — zarządzanie przez
        Django Admin.
      tags:
      - authors
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
          description: ''
  /api/authors/{id}/:
    get:
      operationId: authors_retrieve
      description: |-
        Szczegóły autora: imię, bio, data urodzenia.

        avatar_url zarezerwowany na przyszłość (obecnie null).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - authors
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
          description: ''
  /api/books/:
    get:
      operationId: books_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: per_page
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - books
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookListList'
          description: ''
  /api/books/{book_id}/ai/extract/:
    post:
      operationId: books_ai_extract_create
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      tags:
      - books
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/books/{book_id}/ai/extraction/:
    get:
      operationId: books_ai_extraction_retrieve
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      tags:
      - books
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/books/{book_id}/characters/{character_id}/hide/:
    post:
      operationId: books_characters_hide_create
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      - in: path
        name: character_id
        schema:
          type: integer
        required: true
      tags:
      - books
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/books/{book_id}/characters/{character_id}/merge/:
    post:
      operationId: books_characters_merge_create
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      - in: path
        name: character_id
        schema:
          type: integer
        required: true
      tags:
      - books
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/books/{id_or_slug}/:
    get:
      operationId: books_retrieve
      parameters:
      - in: path
        name: id_or_slug
        schema:
          type: string
        required: true
      tags:
      - books
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookDetail'
          description: ''
  /api/books/{id_or_slug}/reviews/:
    get:
      operationId: books_reviews_list
      description: 'Scoped reviews for a single book: GET /books/:id/reviews/, POST
        /books/:id/reviews/.'
      parameters:
      - in: path
        name: id_or_slug
        schema:
          type: string
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: per_page
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - books
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReviewList'
          description: ''
    post:
      operationId: books_reviews_create
      description: 'Scoped reviews for a single book: GET /books/:id/reviews/, POST
        /books/:id/reviews/.'
      parameters:
      - in: path
        name: id_or_slug
        schema:
          type: string
        required: true
      tags:
      - books
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScopedReviewCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ScopedReviewCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ScopedReviewCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScopedReviewCreate'
          description: ''
  /api/books/{id}/:
    get:
      operationId: books_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - books
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookDetail'
          description: ''
  /api/books/contains-character/:
    get:
      operationId: books_contains_character_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: per_page
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - books
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookListList'
          description: ''
  /api/genres/:
    get:
      operationId: genres_list
      description: Płaska lista wszystkich gatunków, sortowana alfabetycznie. Tylko
        odczyt.
      tags:
      - genres
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Genre'
          description: ''
  /api/genres/{id}/:
    get:
      operationId: genres_retrieve
      description: Szczegóły gatunku.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - genres
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Genre'
          description: ''
  /api/reviews/:
    get:
      operationId: reviews_list
      description: |-
        GET: Płaska lista recenzji, sortowana od najnowszej.
             Filtry: ?book_id=<id> — recenzje danej książki;
             ?user_id=<id> — recenzje danego użytkownika.
        POST: Utwórz recenzję (wymaga logowania). Jedno konto może wystawić max 1 recenzję per książka.
              Po zapisie sygnał Django automatycznie aktualizuje Book.avg_rating i Book.ratings_count.
      tags:
      - reviews
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
          description: ''
    post:
      operationId: reviews_create
      description: |-
        GET: Płaska lista recenzji, sortowana od najnowszej.
             Filtry: ?book_id=<id> — recenzje danej książki;
             ?user_id=<id> — recenzje danego użytkownika.
        POST: Utwórz recenzję (wymaga logowania). Jedno konto może wystawić max 1 recenzję per książka.
              Po zapisie sygnał Django automatycznie aktualizuje Book.avg_rating i Book.ratings_count.
      tags:
      - reviews
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewCreate'
          description: ''
  /api/reviews/{id}/:
    get:
      operationId: reviews_retrieve
      description: |-
        GET: Szczegóły recenzji — publiczne.
        PUT/PATCH: Edycja recenzji — tylko autor recenzji.
        DELETE: Usunięcie recenzji — tylko autor recenzji. Sygnał przelicza avg_rating książki.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - reviews
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
          description: ''
    put:
      operationId: reviews_update
      description: |-
        GET: Szczegóły recenzji — publiczne.
        PUT/PATCH: Edycja recenzji — tylko autor recenzji.
        DELETE: Usunięcie recenzji — tylko autor recenzji. Sygnał przelicza avg_rating książki.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - reviews
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Review'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Review'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Review'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
          description: ''
    patch:
      operationId: reviews_partial_update
      description: |-
        GET: Szczegóły recenzji — publiczne.
        PUT/PATCH: Edycja recenzji — tylko autor recenzji.
        DELETE: Usunięcie recenzji — tylko autor recenzji. Sygnał przelicza avg_rating książki.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - reviews
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedReview'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedReview'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedReview'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
          description: ''
    delete:
      operationId: reviews_destroy
      description: |-
        GET: Szczegóły recenzji — publiczne.
        PUT/PATCH: Edycja recenzji — tylko autor recenzji.
        DELETE: Usunięcie recenzji — tylko autor recenzji. Sygnał przelicza avg_rating książki.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - reviews
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/series/:
    get:
      operationId: series_list
      description: Płaska lista wszystkich serii. Tylko odczyt — zarządzanie przez
        Django Admin.
      tags:
      - series
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Series'
          description: ''
  /api/series/{id}/:
    get:
      operationId: series_retrieve
      description: |-
        Szczegóły serii: nazwa, opis, status (ONGOING/COMPLETED/CANCELLED/HIATUS).

        cover_url obecnie null.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - series
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Series'
          description: ''
  /api/shelf/:
    get:
      operationId: shelf_list
      description: |-
        Zwraca wszystkie wpisy na półce zalogowanego użytkownika, sortowane od najnowszego.
        Statusy: WANT_TO_READ | READING | READ.
      tags:
      - shelf
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShelfEntry'
          description: ''
  /api/shelf/{book_id}/:
    get:
      operationId: shelf_retrieve
      description: |-
        Zarządzanie pojedynczym wpisem na półce dla książki o podanym book_id.
        GET: Pobierz wpis (404 jeśli książka nie jest na półce).
        POST: Dodaj książkę na półkę (domyślny status: WANT_TO_READ). Idempotentne — nie duplikuje.
        PATCH: Zmień status (wymagane pole: status).
        DELETE: Usuń książkę z półki.
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      tags:
      - shelf
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: shelf_create
      description: |-
        Zarządzanie pojedynczym wpisem na półce dla książki o podanym book_id.
        GET: Pobierz wpis (404 jeśli książka nie jest na półce).
        POST: Dodaj książkę na półkę (domyślny status: WANT_TO_READ). Idempotentne — nie duplikuje.
        PATCH: Zmień status (wymagane pole: status).
        DELETE: Usuń książkę z półki.
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      tags:
      - shelf
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: shelf_partial_update
      description: |-
        Zarządzanie pojedynczym wpisem na półce dla książki o podanym book_id.
        GET: Pobierz wpis (404 jeśli książka nie jest na półce).
        POST: Dodaj książkę na półkę (domyślny status: WANT_TO_READ). Idempotentne — nie duplikuje.
        PATCH: Zmień status (wymagane pole: status).
        DELETE: Usuń książkę z półki.
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      tags:
      - shelf
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: shelf_destroy
      description: |-
        Zarządzanie pojedynczym wpisem na półce dla książki o podanym book_id.
        GET: Pobierz wpis (404 jeśli książka nie jest na półce).
        POST: Dodaj książkę na półkę (domyślny status: WANT_TO_READ). Idempotentne — nie duplikuje.
        PATCH: Zmień status (wymagane pole: status).
        DELETE: Usuń książkę z półki.
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      tags:
      - shelf
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/shelf/me/collections/:
    get:
      operationId: shelf_me_collections_list
      tags:
      - shelf
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shelf'
          description: ''
    post:
      operationId: shelf_me_collections_create
      tags:
      - shelf
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShelfCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ShelfCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ShelfCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShelfCreate'
          description: ''
  /api/shelf/me/collections/{shelf_slug}/:
    get:
      operationId: shelf_me_collections_retrieve
      parameters:
      - in: path
        name: shelf_slug
        schema:
          type: string
        required: true
      tags:
      - shelf
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShelfDetail'
          description: ''
    put:
      operationId: shelf_me_collections_update
      parameters:
      - in: path
        name: shelf_slug
        schema:
          type: string
        required: true
      tags:
      - shelf
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShelfCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ShelfCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ShelfCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShelfCreate'
          description: ''
    patch:
      operationId: shelf_me_collections_partial_update
      parameters:
      - in: path
        name: shelf_slug
        schema:
          type: string
        required: true
      tags:
      - shelf
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedShelfCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedShelfCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedShelfCreate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShelfCreate'
          description: ''
    delete:
      operationId: shelf_me_collections_destroy
      parameters:
      - in: path
        name: shelf_slug
        schema:
          type: string
        required: true
      tags:
      - shelf
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/shelf/me/collections/{shelf_slug}/books/{book_id}/:
    post:
      operationId: shelf_me_collections_books_create
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      - in: path
        name: shelf_slug
        schema:
          type: string
        required: true
      tags:
      - shelf
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: shelf_me_collections_books_destroy
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      - in: path
        name: shelf_slug
        schema:
          type: string
        required: true
      tags:
      - shelf
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/u/{handle}/:
    get:
      operationId: u_retrieve
      description: |-
        Publiczny profil użytkownika po handle. Zwraca 404 jeśli profil jest prywatny
        i requestujący nie jest właścicielem.
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      tags:
      - u
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/users/{handle}/follow/:
    post:
      operationId: users_follow_create
      description: |-
        POST: Obserwuj użytkownika o podanym handle.
              400 jeśli próba obserwowania siebie, 409 jeśli już obserwujesz.
        DELETE: Przestań obserwować. 404 jeśli relacja nie istnieje.
      parameters:
      - in: path
        name: handle
        schema:
          type: string
        required: true
      tags:
      - users
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: users_follow_destroy
      description: |-
        POST: Obserwuj użytkownika o podanym handle.
