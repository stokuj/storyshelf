name: Test & Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: stokuj

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        working-directory: backend/backend
        run: mvn -B test

  test-nlp:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: fake-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: nlp-service
        run: uv sync --frozen

      - name: Run tests
        working-directory: nlp-service
        run: uv run pytest -v -m "not integration"

      - name: Run coverage
        working-directory: nlp-service
        run: |
          uv run coverage run -m pytest -m "not integration"
          uv run coverage report --fail-under=70 --include="api/*"

  build-and-push:
    needs: [test-backend, test-nlp]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend/backend
            dockerfile: ./backend/backend/Dockerfile
            image: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/storyshelf-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
            image: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/storyshelf-frontend
          - name: nlp-service
            context: ./nlp-service
            dockerfile: ./nlp-service/Dockerfile
            image: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/storyshelf-nlp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: 22
          script: |
            cd /opt/storyshelf
            bash infra/scripts/deploy.sh
