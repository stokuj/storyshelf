name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Run ruff
        working-directory: backend-django
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: booksdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret-key
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_ENV: dev
      DATABASE_URL: postgres://postgres:secret-key@localhost:5432/booksdb
      DJANGO_SECRET_KEY: test-secret-key-for-ci
      OPENROUTER_API_KEY: sk-dummy
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Run Django tests
        working-directory: backend-django
        run: uv run python manage.py test --noinput
      - name: Verify OpenAPI snapshot
        working-directory: backend-django
        run: DJANGO_ENV=dev uv run python manage.py test config.tests.test_openapi_schema --noinput

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: svelte-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: svelte-frontend/package-lock.json
      - run: npm ci
      - run: npm run types:api
      - run: npm run check
      - run: npm run lint
      - run: npm run build

  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend-django
          file: backend-django/Dockerfile
          push: true
          tags: ghcr.io/stokuj/storyshelf-django:main
      # SvelteKit build step added in phase/2.6-svelte-setup
      
      - uses: docker/build-push-action@v6
        with:
          context: svelte-frontend
          file: svelte-frontend/Dockerfile.prod
          push: true
          tags: ghcr.io/stokuj/storyshelf-svelte:main

